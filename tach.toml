exclude = [
    "tests/*",
]
source_roots = [
    "src",
]
modules = [
    { path = "modules.master_data", depends_on = [] },
    { path = "modules.voyage_spine", depends_on = ["modules.master_data"] },
    { path = "modules.auth", depends_on = [] },
]

[[interfaces]]
expose = [
    "router",
    "admin_router",
]
from = [
    "modules.auth.api",
]

[[interfaces]]
expose = [
    "router",
]
from = [
    "modules.master_data.api",
]

[[interfaces]]
expose = [
    "VesselService",
    "PortService",
    "CounterpartyService",
    "VesselStatus",
    "VesselType",
    "PortStatus",
    "CounterpartyStatus",
    "CounterpartyRoleEnum",
    "VesselNotFoundError",
    "PortNotFoundError",
    "CounterpartyNotFoundError",
]
from = [
    "modules.master_data",
]

[[interfaces]]
expose = [
    "router",
    "VoyageStatus",
    "PortFunction",
]
from = [
    "modules.voyage_spine",
]

