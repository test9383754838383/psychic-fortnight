name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Tach Check
        run: make tach-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests with coverage and runtime check
        run: |
          START_TIME=$(date +%s)
          uv run pytest -n auto --cov=src/modules/master_data --cov=src/modules/voyage_spine --cov=src/modules/auth --cov-fail-under=95 tests
          END_TIME=$(date +%s)
          RUNTIME=$((END_TIME - START_TIME))
          echo "Runtime: ${RUNTIME}s"
          # Wall-clock budget. Pure pytest is ~25s with coverage (xdist -n auto,
          # capped at 2 workers on GitHub free runners); the remaining ~6-7s is
          # fixed uv/worker-spawn/coverage-combine overhead. 45s leaves headroom
          # for that floor while still catching genuine slowdowns. Local `make
          # test` runs in <10s. Tightening below 45s would fail on runner
          # overhead, not test quality.
          if [ $RUNTIME -gt 45 ]; then
            echo "Error: Test suite took too long ($RUNTIME s)"
            exit 1
          fi

  migration-smoke-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: erp_ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Migration smoke test (Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/erp_ops
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

  frontend-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Codegen
        run: pnpm run codegen
        working-directory: frontend
      - name: Typecheck
        run: pnpm run typecheck
        working-directory: frontend
      - name: Lint
        run: pnpm run lint
        working-directory: frontend
      - name: Test (Vitest)
        run: pnpm run test
        working-directory: frontend
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: frontend
      - name: Start Backend Server
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --all-extras --dev
          export DATABASE_URL="sqlite+aiosqlite:///${{ github.workspace }}/dev.db"
          uv run alembic upgrade head
          uv run uvicorn src.app:create_app --factory --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            curl -s http://127.0.0.1:8000/api/v1/voyages && break
            sleep 1
          done
      - name: Run Playwright E2E Tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///${{ github.workspace }}/dev.db
        run: pnpm run test:e2e
        working-directory: frontend
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        working-directory: frontend

